services:
  client:
    build:
      context: ./client/
      dockerfile: dev.Dockerfile
    environment:
      - NEXT_PUBLIC_BACKEND_URL=/api/
    volumes:
      - ./client/:/usr/src/app
      # named volume to prevent node modules 
      # from being deleted in the cotainer
      - client_node_modules:/usr/src/app/node_modules
    container_name: gdg-client-dev

  server:
    build:
      context: ./server/
      dockerfile: dev.Dockerfile
    env_file:
      - ./server/.env
    volumes:
      - ./server/:/app
    container_name: gdg-server-dev

    healthcheck:
      # ping the FastAPI openapi route to check its health
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/openapi.json\")' || exit 1"]
      interval: 5s
      timeout: 1s
      retries: 5
      start_period: 15s
    

  nginx:
    image: nginx:1.29-alpine
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 80:80
    container_name: reverse_proxy
    depends_on:
      client:
        condition: service_started
      server:
        condition: service_healthy

volumes:
  client_node_modules:
